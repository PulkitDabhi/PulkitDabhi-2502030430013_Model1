<!DOCTYPE html>
<html>
<head>
    <title>Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div data-include="header.html"></div>

    <main class="page-content simple-page">
        <section class="form-panel">
            <h1>Sign in to Snackify</h1>
            <p>Access your saved snacks, orders, and quick checkout experience.</p>
            <form>
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="Enter your email" required>

                <label for="password">Password</label>
                <input id="password" type="password" placeholder="Enter your password" required>

                <button type="submit">Login</button>
            </form>
            <p class="form-footer">New to Snackify? <a href="register.html">Create an account</a></p>
        </section>
    </main>

    <div data-include="footer.html"></div>
    <script src="includes.js"></script>

</body>
</html>

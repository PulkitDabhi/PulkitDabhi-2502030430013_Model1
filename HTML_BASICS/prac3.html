<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Media Example</title>
</head>
<body>

    <h1>HTML Elements Example</h1>

    <!-- Marquee -->
    <marquee behavior="scroll" direction="right">
        Welcome to HTML Practical Program
    </marquee>

    <hr>

    <!-- Hyperlink -->
    <h3>Hyperlink Example</h3>
    <a href="https://www.google.com" target="_blank">
        Open Google
    </a>

    <hr>

    <!-- Image -->
    <h3>Image Example</h3>
    <img src="download.jpg" alt="Sample Image" width="300">

    <hr>

    <!-- Audio -->
    <h3>Audio Example</h3>
    <audio controls>
        <source src="audio.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>

    <hr>

    <!-- Video -->
    <h3>Video Example</h3>
    <video width="400" controls>
        <source src="video.mp4" type="video/mp4">
        Your browser does not support video.
    </video>

    <hr>

    <!-- iFrame -->
    <h3>iFrame Example</h3>
    < 
    <iframe
    width="500"
    height="300"
    src="https://www.youtube.com/embed/dQw4w9WgXcQ">
    </iframe>
    

</body>
</html>
